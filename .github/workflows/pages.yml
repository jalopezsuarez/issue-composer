name: Deploy to GitHub Pages

# Despliega el sitio estático (index.html en la raíz) en GitHub Pages
# automáticamente en cada push a main, y permite ejecución manual.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos mínimos que necesita el despliegue de Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados; no cancela el que esté en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publica la raíz del repo (donde está index.html).
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
